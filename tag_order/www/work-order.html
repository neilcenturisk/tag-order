{% extends "templates/web.html" %}

{% block title %}Work Order{% endblock %}

{% block page_content %}
<div style="max-width: 800px; margin: 0 auto; padding: 20px;">

  {% if error %}
  <div style="background: #FEF2F2; border: 1px solid #FECACA; padding: 16px; border-radius: 6px; color: #991B1B;">
    {{ error }}
  </div>
  {% elif order %}

  <div id="work-order-content">
    <div style="text-align: center; margin-bottom: 30px;">
      <h1 style="margin: 0; color: #1F2937;">WORK ORDER</h1>
      <p style="color: #6B7280; margin-top: 5px;">{{ order.name }}</p>
    </div>

    <!-- Project Info -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Project ID</label>
        <input type="text" id="project_id" value="{{ order.project_id or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Project Name</label>
        <input type="text" id="project_name" value="{{ order.project_name or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Client Info -->
    <div style="background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 20px; margin-bottom: 24px;">
      <h3 style="margin: 0 0 16px; color: #374151; font-size: 14px; text-transform: uppercase;">Client Information</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div>
          <label style="font-size: 11px; color: #6B7280;">Client Name</label>
          <input type="text" id="client_name" value="{{ order.client_name or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Contact Name</label>
          <input type="text" id="contact_name" value="{{ order.contact_name or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Address</label>
          <input type="text" id="address" value="{{ order.address or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">City</label>
          <input type="text" id="city" value="{{ order.city or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">State</label>
          <input type="text" id="state" value="{{ order.state or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Zip</label>
          <input type="text" id="zip_code" value="{{ order.zip_code or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Phone</label>
          <input type="text" id="phone" value="{{ order.phone or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">E-Mail</label>
          <input type="text" id="email" value="{{ order.email or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">PO#</label>
          <input type="text" id="po_number" value="{{ order.po_number or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Tag #</label>
          <input type="text" id="tag_number" value="{{ order.tag_number or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
      </div>
    </div>

    <!-- People -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Sales Representative</label>
        <input type="text" id="sales_rep" value="{{ order.sales_rep or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Project Manager</label>
        <input type="text" id="project_manager" value="{{ order.project_manager or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Timesheet Approver</label>
        <input type="text" id="timesheet_approver" value="{{ order.timesheet_approver or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Contract -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Contract Start Date</label>
        <input type="date" id="contract_start_date" value="{{ order.contract_start_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Est. End Date</label>
        <input type="date" id="est_end_date" value="{{ order.est_end_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Contract Type</label>
        <input type="text" id="contract_type" value="{{ order.contract_type or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Revenue Type</label>
        <input type="text" id="revenue_type" value="{{ order.revenue_type or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Budget -->
    <div style="background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 20px; margin-bottom: 24px;">
      <h3 style="margin: 0 0 16px; color: #374151; font-size: 14px; text-transform: uppercase;">Budget</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
        <div>
          <label style="font-size: 11px; color: #6B7280;">Total Contract Amount</label>
          <input type="number" step="0.01" id="total_contract_amount" value="{{ order.total_contract_amount or 0 }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Expenses Budget</label>
          <input type="number" step="0.01" id="expenses_budget" value="{{ order.expenses_budget or 0 }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Project Services Budget</label>
          <input type="number" step="0.01" id="project_services_budget" value="{{ order.project_services_budget or 0 }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
      </div>
    </div>

    <!-- Hours -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Total Project Hours</label>
        <input type="number" step="0.5" id="total_project_hours" value="{{ order.total_project_hours or 0 }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Appraiser Hours</label>
        <input type="number" step="0.5" id="appraiser_hours" value="{{ order.appraiser_hours or 0 }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Solution Delivery Hours</label>
        <input type="number" step="0.5" id="solution_delivery_hours" value="{{ order.solution_delivery_hours or 0 }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Accounting Info -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">FYE</label>
        <input type="text" id="fye" value="{{ order.fye or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">CAP/Critical Rates</label>
        <input type="text" id="cap_critical_rates" value="{{ order.cap_critical_rates or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Date Due to Solution Delivery</label>
        <input type="date" id="date_due_solution_delivery" value="{{ order.date_due_solution_delivery or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Timing -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 30px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Start Date</label>
        <input type="date" id="start_date" value="{{ order.start_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Delivery Date</label>
        <input type="date" id="delivery_date" value="{{ order.delivery_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div style="display: flex; gap: 12px; margin-top: 20px;" id="action-buttons">
    <button onclick="saveWorkOrder()" style="background: #4F46E5; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500;">
      Save Changes
    </button>
    <button onclick="downloadPDF()" style="background: #059669; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500;">
      Download PDF
    </button>
  </div>

  <div id="save-status" style="margin-top: 12px;"></div>

  <script>
    function saveWorkOrder() {
      const fields = [
        'project_id', 'project_name', 'client_name', 'contact_name',
        'address', 'city', 'state', 'zip_code', 'phone', 'email',
        'po_number', 'tag_number', 'sales_rep', 'project_manager',
        'timesheet_approver', 'contract_start_date', 'est_end_date',
        'contract_type', 'revenue_type', 'total_contract_amount',
        'expenses_budget', 'project_services_budget', 'total_project_hours',
        'appraiser_hours', 'solution_delivery_hours', 'fye',
        'cap_critical_rates', 'date_due_solution_delivery',
        'start_date', 'delivery_date'
      ];

      const data = {};
      fields.forEach(f => {
        const el = document.getElementById(f);
        if (el) data[f] = el.value;
      });

      fetch('/api/method/tag_order.tag_order.api.save_work_order', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Frappe-CSRF-Token': '{{ frappe.session.csrf_token }}'
        },
        body: JSON.stringify({ token: '{{ token }}', fields: data })
      })
      .then(r => r.json())
      .then(result => {
        if (result.message && result.message.success) {
          document.getElementById('save-status').innerHTML = '<p style="color: #059669; font-weight: 500;">✓ Saved successfully</p>';
        } else {
          document.getElementById('save-status').innerHTML = '<p style="color: #DC2626; font-weight: 500;">Error saving. Please try again.</p>';
        }
      })
      .catch(() => {
        document.getElementById('save-status').innerHTML = '<p style="color: #DC2626; font-weight: 500;">Error saving. Please try again.</p>';
      });
    }

    function downloadPDF() {
      window.location.href = '/api/method/tag_order.tag_order.api.download_work_order_pdf?token={{ token }}';
    }
  </script>

  {% endif %}
</div>
{% endblock %}
