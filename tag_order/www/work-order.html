{% extends "templates/web.html" %}

{% block title %}Work Order{% endblock %}

{% block page_content %}
<div style="max-width: 800px; margin: 0 auto; padding: 20px;">

  {% if error %}
  <div style="background: #FEF2F2; border: 1px solid #FECACA; padding: 16px; border-radius: 6px; color: #991B1B;">
    {{ error }}
  </div>
  {% elif order %}

  <div id="work-order-content">
    <div style="text-align: center; margin-bottom: 30px;">
      <h1 style="margin: 0; color: #1F2937;">WORK ORDER</h1>
      <p style="color: #6B7280; margin-top: 5px;">{{ order.name }}</p>
    </div>

    <!-- Project Info -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Project ID</label>
        <input type="text" id="wo_project_id" value="{{ order.wo_project_id or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Project Name</label>
        <input type="text" id="wo_project_name" value="{{ order.wo_project_name or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Client Info -->
    <div style="background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 20px; margin-bottom: 24px;">
      <h3 style="margin: 0 0 16px; color: #374151; font-size: 14px; text-transform: uppercase;">Client Information</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div>
          <label style="font-size: 11px; color: #6B7280;">Client Name</label>
          <input type="text" id="wo_client_name" value="{{ order.wo_client_name or order.client_name or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Contact Name</label>
          <input type="text" id="wo_contact_name" value="{{ order.wo_contact_name or order.contact_name or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Address</label>
          <input type="text" id="wo_address" value="{{ order.wo_address or order.address_street or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">City</label>
          <input type="text" id="wo_city" value="{{ order.wo_city or order.address_city or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">State</label>
          <input type="text" id="wo_state" value="{{ order.wo_state or order.address_state or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Zip</label>
          <input type="text" id="wo_zip" value="{{ order.wo_zip or order.address_zip or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Phone</label>
          <input type="text" id="wo_phone" value="{{ order.wo_phone or order.phone or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">E-Mail</label>
          <input type="text" id="wo_email" value="{{ order.wo_email or order.email or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">PO#</label>
          <input type="text" id="wo_po_number" value="{{ order.wo_po_number or order.po_number or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Tag #</label>
          <input type="text" id="wo_tag_number" value="{{ order.wo_tag_number or order.starting_number or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
      </div>
    </div>

    <!-- People -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Sales Representative</label>
        <input type="text" id="wo_sales_rep" value="{{ order.wo_sales_rep or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Project Manager</label>
        <input type="text" id="wo_project_manager" value="{{ order.wo_project_manager or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Timesheet Approver</label>
        <input type="text" id="wo_timesheet_approver" value="{{ order.wo_timesheet_approver or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Contract -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Contract Start Date</label>
        <input type="date" id="wo_contract_start_date" value="{{ order.wo_contract_start_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Est. End Date</label>
        <input type="date" id="wo_est_end_date" value="{{ order.wo_est_end_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Contract Type</label>
        <input type="text" id="wo_contract_type" value="{{ order.wo_contract_type or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Revenue Type</label>
        <input type="text" id="wo_revenue_type" value="{{ order.wo_revenue_type or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Budget -->
    <div style="background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 20px; margin-bottom: 24px;">
      <h3 style="margin: 0 0 16px; color: #374151; font-size: 14px; text-transform: uppercase;">Budget</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
        <div>
          <label style="font-size: 11px; color: #6B7280;">Total Contract Amount</label>
          <input type="number" step="0.01" id="wo_total_contract_amount" value="{{ order.wo_total_contract_amount or order.total_price or 0 }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Expenses Budget</label>
          <input type="number" step="0.01" id="wo_expenses_budget" value="{{ order.wo_expenses_budget or 0 }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
        <div>
          <label style="font-size: 11px; color: #6B7280;">Project Services Budget</label>
          <input type="number" step="0.01" id="wo_project_services_budget" value="{{ order.wo_project_services_budget or order.total_price or 0 }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 2px;">
        </div>
      </div>
    </div>

    <!-- Hours -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Total Project Hours</label>
        <input type="number" step="0.5" id="wo_total_hours" value="{{ order.wo_total_hours or 1 }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Appraiser Hours</label>
        <input type="number" step="0.5" id="wo_appraiser_hours" value="{{ order.wo_appraiser_hours or 0 }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Solution Delivery Hours</label>
        <input type="number" step="0.5" id="wo_solution_delivery_hours" value="{{ order.wo_solution_delivery_hours or 0 }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Accounting Info -->
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">FYE</label>
        <input type="text" id="wo_fye" value="{{ order.wo_fye or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">CAP/Critical Rates</label>
        <input type="text" id="wo_cap_critical_rates" value="{{ order.wo_cap_critical_rates or '' }}" style="width: 100%; padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Date Due to Solution Delivery</label>
        <input type="date" id="wo_date_due_solution_delivery" value="{{ order.wo_date_due_solution_delivery or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>

    <!-- Timing -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 30px;">
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Start Date</label>
        <input type="date" id="wo_start_date" value="{{ order.wo_start_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
      <div>
        <label style="font-size: 12px; color: #6B7280; text-transform: uppercase; font-weight: 600;">Delivery Date</label>
        <input type="date" id="wo_delivery_date" value="{{ order.wo_delivery_date or '' }}" style="width: 100%; padding: 8px 12px; border: 1px solid #D1D5DB; border-radius: 4px; margin-top: 4px;">
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div style="display: flex; gap: 12px; margin-top: 20px;" id="action-buttons">
    <button onclick="saveWorkOrder()" style="background: #4F46E5; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500;">
      Save Changes
    </button>
    <button onclick="downloadPDF()" style="background: #059669; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: 500;">
      Download PDF
    </button>
  </div>

  <div id="save-status" style="margin-top: 12px;"></div>

  <script>
    function saveWorkOrder() {
      const fields = [
        'wo_project_id', 'wo_project_name', 'wo_client_name', 'wo_contact_name',
        'wo_address', 'wo_city', 'wo_state', 'wo_zip', 'wo_phone', 'wo_email',
        'wo_po_number', 'wo_tag_number', 'wo_sales_rep', 'wo_project_manager',
        'wo_timesheet_approver', 'wo_contract_start_date', 'wo_est_end_date',
        'wo_contract_type', 'wo_revenue_type', 'wo_total_contract_amount',
        'wo_expenses_budget', 'wo_project_services_budget', 'wo_total_hours',
        'wo_appraiser_hours', 'wo_solution_delivery_hours', 'wo_fye',
        'wo_cap_critical_rates', 'wo_date_due_solution_delivery',
        'wo_start_date', 'wo_delivery_date'
      ];

      const data = {};
      fields.forEach(f => {
        const el = document.getElementById(f);
        if (el) data[f] = el.value;
      });

      fetch('/api/method/tag_order.tag_order.api.save_work_order', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Frappe-CSRF-Token': '{{ frappe.session.csrf_token }}'
        },
        body: JSON.stringify({ token: '{{ token }}', fields: data })
      })
      .then(r => r.json())
      .then(result => {
        if (result.message && result.message.success) {
          document.getElementById('save-status').innerHTML = '<p style="color: #059669; font-weight: 500;">✓ Saved successfully</p>';
        } else {
          document.getElementById('save-status').innerHTML = '<p style="color: #DC2626; font-weight: 500;">Error saving. Please try again.</p>';
        }
      })
      .catch(() => {
        document.getElementById('save-status').innerHTML = '<p style="color: #DC2626; font-weight: 500;">Error saving. Please try again.</p>';
      });
    }

    function downloadPDF() {
      window.location.href = '/api/method/tag_order.tag_order.api.download_work_order_pdf?token={{ token }}';
    }
  </script>

  <style>
    @media print {
      #action-buttons, #save-status { display: none !important; }
      input { border: none !important; padding: 4px 0 !important; }
    }
  </style>

  {% endif %}
</div>
{% endblock %}
