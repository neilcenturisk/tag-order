<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="border-bottom: 2px solid #4F46E5; padding-bottom: 15px; margin-bottom: 20px;">
    <h2 style="margin: 0; color: #1F2937;">Tag Order Update</h2>
    <p style="margin: 5px 0 0; color: #6B7280;">Order #{{ order_number }}</p>
  </div>

  <p>Hi {{ contact_name }},</p>

  {% block content %}{% endblock %}

  <div style="margin: 30px 0;">
    <a href="{{ tracking_link }}" style="background: #4F46E5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: 500;">Track Your Order</a>
  </div>

  <div style="border-top: 1px solid #E5E7EB; padding-top: 15px; margin-top: 30px; color: #6B7280; font-size: 13px;">
    <p>Thank you,<br>Centurisk Support</p>
    <p style="font-size: 12px;">You're receiving this because you placed a tag order with us. <a href="{{ tracking_link }}">View order details</a></p>
  </div>
</div>
